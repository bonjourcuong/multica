# Development override: build the backend/web images from the current checkout
# instead of pulling the official GHCR images.
#
# The built image inherits the `image:` field from docker-compose.selfhost.yml,
# which resolves to ${MULTICA_BACKEND_IMAGE}:${MULTICA_IMAGE_TAG} (and the web
# equivalent). Set MULTICA_IMAGE_TAG to a commit SHA in `.env` so each build is
# pinned to a real revision instead of the mutable `latest` tag (MUL-175 / F3).
# scripts/deploy-fork-build.sh exports MULTICA_IMAGE_TAG=$(git rev-parse --short HEAD)
# automatically before invoking the build.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_VERSION: ${MULTICA_IMAGE_TAG:-dev}
