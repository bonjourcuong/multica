# Self-hosting Docker Compose — starts PostgreSQL, backend, and frontend.
#
# Usage:
#   cp .env.example .env
#   # Edit .env — change JWT_SECRET at minimum
#   docker compose -f docker-compose.selfhost.yml up -d
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8080 (also used by CLI/daemon)

name: multica

services:
  postgres:
    # Pinned by digest (audit MUL-175 / F3). Tag is informational; the digest is
    # what Docker pulls. To rotate: see docs/runbook/image-pinning.md.
    image: pgvector/pgvector:pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${MULTICA_BACKEND_IMAGE:-ghcr.io/multica-ai/multica-backend}:${MULTICA_IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/data/uploads
      # PKM bridge — bind-mount the host directory holding workspace
      # markdown notes into the container. The Documents API joins each
      # workspace's pkm_path under MULTICA_PKM_ROOT, so MOUNT_TARGET must
      # be a path inside (or equal to) MULTICA_PKM_ROOT. Leave HOST_DIR
      # empty to mount /dev/null and keep the documents feature dormant.
      # See .env.example for two configuration recipes.
      - ${MULTICA_PKM_HOST_DIR:-/dev/null}:${MULTICA_PKM_MOUNT_TARGET:-/pkm}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      PORT: "8080"
      # JWT_SECRET and RESEND_API_KEY are mounted as Docker file-backed secrets
      # under /run/secrets/ (see top-level `secrets:` block below). The server
      # resolves them via secrets.FromFileOrEnv (MUL-176), which prefers the
      # file over the env var. Keeping the values out of `environment:` removes
      # them from `docker inspect`'s Config.Env array (audit MUL-172, F4 / MUL-184).
      MULTICA_PKM_ROOT: ${MULTICA_PKM_ROOT:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-west-2}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${CLOUDFRONT_PRIVATE_KEY:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      APP_ENV: ${APP_ENV:-production}
      MULTICA_APP_URL: ${MULTICA_APP_URL:-http://localhost:3000}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
    secrets:
      - jwt_secret
      - resend_api_key
    restart: unless-stopped

  frontend:
    image: ${MULTICA_WEB_IMAGE:-ghcr.io/multica-ai/multica-web}:${MULTICA_IMAGE_TAG:-latest}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped

volumes:
  pgdata:
  backend_uploads:

# File-backed secrets (compose v2). Each value is read from the compose
# process environment (typically `.env`) at deploy time and mounted into the
# backend container at /run/secrets/<name>. The value is NOT injected into
# the service's environment, so `docker inspect <container>` no longer
# exposes it via Config.Env (audit MUL-172, F4). The server reads each
# secret with secrets.FromFileOrEnv (MUL-176) — file path wins, env var is
# the fallback for non-Docker runs.
secrets:
  jwt_secret:
    environment: JWT_SECRET
  resend_api_key:
    environment: RESEND_API_KEY
